apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Create k8s/secrets.env from k8s/secrets.env.example before applying.
namespace: crush

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - webhook-deployment.yaml
  - webhook-service.yaml

configMapGenerator:
  - name: crush-config
    envs:
      - config.env

secretGenerator:
  - name: crush-secrets
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: crush-config
      fieldPath: data.WEBHOOK_IMAGE
    targets:
      - select:
          kind: Deployment
          name: crush-webhook
        fieldPaths:
          - spec.template.spec.containers.[name=webhook].image
