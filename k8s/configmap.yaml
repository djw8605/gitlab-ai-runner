apiVersion: v1
kind: ConfigMap
metadata:
  name: crush-config
  namespace: crush
  labels:
    app: crush-webhook
data:
  # GitLab instance URL (no trailing slash)
  GITLAB_BASE_URL: "https://gitlab.example.com"

  # Kubernetes namespace where runner Jobs are created
  K8S_NAMESPACE: "crush"

  # Container image for the webhook receiver Deployment
  WEBHOOK_IMAGE: "YOUR_REGISTRY/crush-webhook:latest"

  # Container image for the runner Job
  JOB_IMAGE: "YOUR_REGISTRY/crush-runner:latest"

  # Crush provider endpoint (OpenAI-compatible, must include /v1)
  CRUSH_BASE_URL: "http://vllm-service.vllm.svc.cluster.local:8000/v1"

  # Model name as registered by your provider
  CRUSH_MODEL: "openai/Qwen3-Coder-30B-A3B-Instruct"

  # Comma-separated list of tools crush can use without prompting
  CRUSH_ALLOWED_TOOLS: "view,ls,grep,edit,bash"

  # Timeout for each crush run invocation in seconds
  CRUSH_TIMEOUT_SECONDS: "1800"

  # Job TTL in seconds (default 1800 = 30 minutes)
  JOB_TTL_SECONDS: "1800"

  # Resource limits for runner Jobs (optional)
  JOB_CPU_LIMIT: "4"
  JOB_MEM_LIMIT: "8Gi"

  # Comma-separated allowlist of GitLab usernames (leave empty to allow all)
  ALLOWED_USERS: ""
