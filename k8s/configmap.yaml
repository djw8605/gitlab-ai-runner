apiVersion: v1
kind: ConfigMap
metadata:
  name: openhands-config
  namespace: openhands
  labels:
    app: openhands-webhook
data:
  # GitLab instance URL (no trailing slash)
  GITLAB_BASE_URL: "https://gitlab.example.com"

  # Kubernetes namespace where runner Jobs are created
  K8S_NAMESPACE: "openhands"

  # Container image for the runner Job
  JOB_IMAGE: "YOUR_REGISTRY/openhands-runner:latest"

  # vLLM OpenAI-compatible endpoint (must include /v1)
  LLM_BASE_URL: "http://vllm-service.vllm.svc.cluster.local:8000/v1"

  # Model name as registered in vLLM
  LLM_MODEL: "openai/Qwen3-Coder-30B-A3B-Instruct"

  # Job TTL in seconds (default 1800 = 30 minutes)
  JOB_TTL_SECONDS: "1800"

  # Resource limits for runner Jobs (optional)
  JOB_CPU_LIMIT: "4"
  JOB_MEM_LIMIT: "8Gi"

  # Comma-separated allowlist of GitLab usernames (leave empty to allow all)
  ALLOWED_USERS: ""
