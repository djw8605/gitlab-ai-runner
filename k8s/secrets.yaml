# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# DO NOT COMMIT THIS FILE WITH REAL VALUES
# Add secrets.yaml to .gitignore
# Use a secrets manager (Vault, Sealed Secrets, etc.) in production
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
apiVersion: v1
kind: Secret
metadata:
  name: openhands-secrets
  namespace: openhands
  labels:
    app: openhands-webhook
type: Opaque
stringData:
  # Shared secret configured in the GitLab webhook settings
  WEBHOOK_SECRET: "REPLACE_WITH_STRONG_RANDOM_SECRET"

  # GitLab Personal Access Token or Project Access Token
  # Required scopes: api, read_repository, write_repository
  GITLAB_TOKEN: "REPLACE_WITH_GITLAB_TOKEN"

  # API key for the vLLM endpoint (can be any string if vLLM has no auth)
  LLM_API_KEY: "REPLACE_WITH_LLM_API_KEY"
