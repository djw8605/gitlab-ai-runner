apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openhands-webhook
  namespace: openhands
  labels:
    app: openhands-webhook
rules:
  # Allow the webhook receiver to create, inspect, and clean up Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Allow optional inspection of Pod logs for debugging
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
